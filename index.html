<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMAROSE LIFESTYLE</title>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: Arial, sans-serif; }
    body {
      background: linear-gradient(180deg, #ffd8ea 0%, #fff7fb 55%, #fff 100%);
      color: #4a3340;
      min-height: 100vh;
    }
    .container {

      margin: 0 auto;
      padding: 16px 16px 100px;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .top-badge {
      display: inline-block;
      background: rgba(255,255,255,0.85);
      border: 1px solid #f3c4d7;
      color: #c26e93;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 11px;
      letter-spacing: .18em;
      text-align: center;
      flex: 1;
    }
    .lang-switch {
      display: flex;
      gap: 6px;
    }
    .lang-btn {
      border: 1px solid #efbfd0;
      background: rgba(255,255,255,0.92);
      color: #b95a81;
      border-radius: 12px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }
    .lang-btn.active {

    }
    .brand {

      padding: 10px 0 18px;
    }

      font-family: Georgia, serif;
      font-size: 46px;
      color: #b68646;
      font-weight: 500;
      letter-spacing: 2px;
    }
    .brand p {
      color: #7d6670;
      font-size: 14px;
      margin-top: 6px;
    }
    .hero {
      background: rgba(255,255,255,0.92);
      border: 1px solid #f2c6d8;
      border-radius: 28px;
      padding: 18px;
      box-shadow: 0 12px 30px rgba(213, 110, 151, 0.12);
    }
    .hero-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    .hero small {
      color: #d06d96;
      text-transform: uppercase;
      letter-spacing: .18em;
      font-size: 11px;
    }
    .hero h2 {
      font-size: 28px;
      line-height: 1.15;
      margin-top: 8px;
    }
    .rose-box {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: #ffe4ee;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
    }
    .hero-text {
      margin-top: 10px;
      color: #7a6670;
      font-size: 14px;
      line-height: 1.5;
    }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 18px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      margin-top: 14px;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(90deg, #d76a95, #e78eb3);
      color: white;
    }
    .btn-soft {
      background: #fff8fb;
      color: #c05d85;
      border: 1px solid #efbfd0;
    }
    .section {
      margin-top: 26px;
    }
    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .section-head h3 {
      font-size: 20px;
    }
    .section-head span {
      color: #d06d96;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

      background: rgba(255,255,255,0.94);

      border-radius: 20px;
      padding: 14px 8px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(215, 119, 156, 0.08);
    }
