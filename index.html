<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AMAROSE V5 TEST</title>
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#faf6f7;color:#23181d}
    .app{max-width:430px;margin:0 auto;padding:16px 16px 90px}
    .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
    .brand{font-size:30px;font-family:Georgia,serif;color:#b8893d}
    .mini{font-size:10px;font-weight:700;color:#7e173b;letter-spacing:.18em}
    .langs{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
    .lang{border:1px solid #e7d4db;background:#fff;border-radius:12px;padding:7px 9px;font-size:12px;font-weight:700}
    .active{background:#7e173b;color:#fff}
    .hero{margin-top:14px;background:linear-gradient(135deg,#7e173b,#a42f5b);color:#fff;border-radius:24px;padding:18px}
    .hero h1{font-size:28px;line-height:1.08;margin:4px 0 8px}
    .card{margin-top:14px;background:#fff;border:1px solid #ead7dd;border-radius:22px;padding:16px}
    .label{display:block;font-size:13px;font-weight:700;margin-bottom:8px;color:#6f5d63}
    .row{display:flex;gap:10px}
    .country{min-width:150px;border:1px solid #ead7dd;background:#fff;border-radius:16px;padding:14px 12px}
    .phone{flex:1;border:1px solid #ead7dd;border-radius:16px;padding:14px 12px;font-size:16px}
    .btn{width:100%;margin-top:14px;border:0;border-radius:16px;padding:14px;background:#7e173b;color:#fff;font-size:16px;font-weight:700}
    .soft{background:#fff;color:#7e173b;border:1px solid #ead7dd}
    .otp{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:14px 0}
    .otp div{background:#fff;border:1px solid #ead7dd;border-radius:16px;padding:16px 0;text-align:center;font-size:28px;font-weight:800}
    .hidden{display:none}
    .status{margin-top:12px;padding:10px 12px;border-radius:14px;background:#f7eef2;color:#7e173b;font-weight:700}
    .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:none;align-items:flex-end;justify-content:center}
    .overlay.show{display:flex}
    .sheet{width:min(96vw,430px);max-height:75vh;background:#24212a;color:#fff;border-radius:24px 24px 0 0;overflow:hidden}
    .sheetTop{padding:14px}
    .search{width:100%;border:0;outline:0;background:#36323f;color:#fff;border-radius:14px;padding:12px 14px;font-size:16px}
    .list{max-height:58vh;overflow:auto}
    .item{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-top:1px solid rgba(255,255,255,.08)}
    .left{display:flex;gap:12px;align-items:center}.flag{font-size:26px}.dot{width:24px;height:24px;border-radius:50%;border:3px solid #bcb2c7}.dot.on{border-color:#cb9cff;box-shadow:inset 0 0 0 5px #cb9cff}
  </style>
</head>
<body>
  <div class="app">
    <div class="top">
      <div>
        <div class="brand">AMAROSE</div>
        <div class="mini">V5 TEST SIMPLE</div>
      </div>
      <div class="langs">
        <button type="button" class="lang" data-lang="en">EN</button>
        <button type="button" class="lang" data-lang="ru">RU</button>
        <button type="button" class="lang" data-lang="hy">HY</button>
        <button type="button" class="lang" data-lang="es">ES</button>
        <button type="button" class="lang" data-lang="fr">FR</button>
        <button type="button" class="lang" data-lang="de">DE</button>
      </div>
    </div><section id="loginScreen">
  <div class="hero">
    <div id="welcomeText">Добро пожаловать</div>
    <h1 id="titleText">Вход по номеру телефона</h1>
    <div id="descText">Выберите код страны и нажмите продолжить.</div>
  </div>
  <div class="card">
    <label class="label" id="phoneLabel">Номер телефона</label>
    <div class="row">
      <button type="button" class="country" id="countryBtn">🇦🇲 Armenia +374</button>
      <input class="phone" id="phoneInput" type="tel" placeholder="00 00 00 00" />
    </div>
    <button type="button" class="btn" id="continueBtn">Продолжить</button>
    <div class="status" id="statusBox">READY</div>
  </div>
</section>

<section id="otpScreen" class="hidden">
  <div class="hero">
    <div id="otpLabel">Подтверждение</div>
    <h1 id="otpTitle">Введите код</h1>
    <div id="otpDesc">Мы отправили код на ваш номер.</div>
  </div>
  <div class="card">
    <div class="otp"><div>1</div><div>2</div><div>3</div><div>4</div></div>
    <button type="button" class="btn" id="backBtn">Назад</button>
  </div>
</section>

  </div>  <div class="overlay" id="pickerOverlay">
    <div class="sheet">
      <div class="sheetTop">
        <input id="countrySearch" class="search" placeholder="Поиск страны или кода" />
      </div>
      <div id="countryList" class="list"></div>
    </div>
  </div>  <script>
    const texts = {
      en:{welcome:'Welcome',title:'Enter by phone number',desc:'Choose your country code and press continue.',phone:'Phone number',continue:'Continue',otpLabel:'Verification',otpTitle:'Enter the code',otpDesc:'We sent a code to your number.',back:'Back',search:'Search country or code'},
      ru:{welcome:'Добро пожаловать',title:'Вход по номеру телефона',desc:'Выберите код страны и нажмите продолжить.',phone:'Номер телефона',continue:'Продолжить',otpLabel:'Подтверждение',otpTitle:'Введите код',otpDesc:'Мы отправили код на ваш номер.',back:'Назад',search:'Поиск страны или кода'},
      hy:{welcome:'Բարի գալուստ',title:'Մուտք հեռախոսահամարով',desc:'Ընտրեք երկրի կոդը և սեղմեք շարունակել։',phone:'Հեռախոսահամար',continue:'Շարունակել',otpLabel:'Հաստատում',otpTitle:'Մուտքագրեք կոդը',otpDesc:'Մենք ուղարկել ենք կոդը ձեր համարին։',back:'Հետ',search:'Որոնել երկիր կամ կոդ'},
      es:{welcome:'Bienvenido',title:'Entrar por número de teléfono',desc:'Elija el código del país y pulse continuar.',phone:'Número de teléfono',continue:'Continuar',otpLabel:'Verificación',otpTitle:'Introduzca el código',otpDesc:'Hemos enviado un código a su número.',back:'Atrás',search:'Buscar país o código'},
      fr:{welcome:'Bienvenue',title:'Entrer par numéro de téléphone',desc:'Choisissez l’indicatif et appuyez sur continuer.',phone:'Numéro de téléphone',continue:'Continuer',otpLabel:'Vérification',otpTitle:'Entrez le code',otpDesc:'Nous avons envoyé un code à votre numéro.',back:'Retour',search:'Rechercher pays ou code'},
      de:{welcome:'Willkommen',title:'Einstieg per Telefonnummer',desc:'Wählen Sie die Vorwahl und drücken Sie weiter.',phone:'Telefonnummer',continue:'Weiter',otpLabel:'Bestätigung',otpTitle:'Code eingeben',otpDesc:'Wir haben einen Code an Ihre Nummer gesendet.',back:'Zurück',search:'Land oder Code suchen'}
    };

    const countries = [
      {flag:'🇦🇲',name:'Armenia',code:'+374'},{flag:'🇷🇺',name:'Russia',code:'+7'},{flag:'🇳🇱',name:'Netherlands',code:'+31'},{flag:'🇫🇷',name:'France',code:'+33'},{flag:'🇩🇪',name:'Germany',code:'+49'},
      {flag:'🇪🇸',name:'Spain',code:'+34'},{flag:'🇺🇸',name:'United States',code:'+1'},{flag:'🇨🇦',name:'Canada',code:'+1'},{flag:'🇬🇧',name:'United Kingdom',code:'+44'},{flag:'🇮🇹',name:'Italy',code:'+39'},
      {flag:'🇵🇱',name:'Poland',code:'+48'},{flag:'🇦🇪',name:'United Arab Emirates',code:'+971'},{flag:'🇮🇳',name:'India',code:'+91'},{flag:'🇨🇳',name:'China',code:'+86'},{flag:'🇯🇵',name:'Japan',code:'+81'}
    ];

    let state = { lang:'ru', country:countries[0] };

    const els = {
      loginScreen: document.getElementById('loginScreen'),
      otpScreen: document.getElementById('otpScreen'),
      countryBtn: document.getElementById('countryBtn'),
      continueBtn: document.getElementById('continueBtn'),
      backBtn: document.getElementById('backBtn'),
      pickerOverlay: document.getElementById('pickerOverlay'),
      countryList: document.getElementById('countryList'),
      countrySearch: document.getElementById('countrySearch'),
      statusBox: document.getElementById('statusBox')
    };

    function applyLang(){
      const t = texts[state.lang];
      document.getElementById('welcomeText').textContent = t.welcome;
      document.getElementById('titleText').textContent = t.title;
      document.getElementById('descText').textContent = t.desc;
      document.getElementById('phoneLabel').textContent = t.phone;
      document.getElementById('continueBtn').textContent = t.continue;
      document.getElementById('otpLabel').textContent = t.otpLabel;
      document.getElementById('otpTitle').textContent = t.otpTitle;
      document.getElementById('otpDesc').textContent = t.otpDesc;
      document.getElementById('backBtn').textContent = t.back;
      document.getElementById('countrySearch').placeholder = t.search;
      document.querySelectorAll('.lang').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === state.lang));
      els.countryBtn.textContent = `${state.country.flag} ${state.country.name} ${state.country.code}`;
    }

    function show(screen){
      els.loginScreen.classList.toggle('hidden', screen !== 'login');
      els.otpScreen.classList.toggle('hidden', screen !== 'otp');
      els.statusBox.textContent = 'SCREEN: ' + screen.toUpperCase();
    }

    function renderCountries(query=''){
      const q = query.toLowerCase().trim();
      els.countryList.innerHTML = '';
      countries.filter(c => !q || c.name.toLowerCase().includes(q) || c.code.includes(q)).forEach(c => {
        const row = document.createElement('div');
        const active = state.country.name === c.name && state.country.code === c.code;
        row.className = 'item';
        row.innerHTML = `<div class="left"><div class="flag">${c.flag}</div><div><div class="name">${c.name}</div><div class="code">${c.code}</div></div></div><div class="dot ${active ? 'on' : ''}"></div>`;
        row.addEventListener('click', function(){
          state.country = c;
          applyLang();
          els.pickerOverlay.classList.remove('show');
          els.statusBox.textContent = 'COUNTRY: ' + c.name;
        });
        els.countryList.appendChild(row);
      });
    }

    document.querySelectorAll('.lang').forEach(btn => {
      btn.addEventListener('click', function(){
        state.lang = btn.dataset.lang;
        applyLang();
        els.statusBox.textContent = 'LANG: ' + state.lang.toUpperCase();
      });
    });

    els.countryBtn.addEventListener('click', function(){
      els.pickerOverlay.classList.add('show');
      renderCountries(els.countrySearch.value || '');
      els.statusBox.textContent = 'PICKER OPEN';
    });

    els.continueBtn.addEventListener('click', function(){
      show('otp');
    });

    els.backBtn.addEventListener('click', function(){
      show('login');
    });

    els.countrySearch.addEventListener('input', function(e){
      renderCountries(e.target.value);
    });

    els.pickerOverlay.addEventListener('click', function(e){
      if(e.target === els.pickerOverlay){
        els.pickerOverlay.classList.remove('show');
        els.statusBox.textContent = 'PICKER CLOSED';
      }
    });

    applyLang();
    show('login');
  </script></body>
</html>
